<!-- templates/result.html -->
{% extends "base.html" %}
{% block content %}
<div class="py-20 px-10 max-w-5xl mx-auto">
    <div class="glass-card rounded-[2.5rem] overflow-hidden flex flex-col md:flex-row shadow-[0_30px_60px_-12px_rgba(26,67,46,0.15)]">
        <div class="md:w-5/12 p-4 bg-[#f8fafc]">
            <div class="relative h-full min-h-[400px]">
                <img src="{{ url_for('static', filename='uploads/' + filename) }}" class="absolute inset-0 w-full h-full object-cover rounded-[1.5rem] shadow-xl">
                <div class="absolute top-4 left-4 bg-[#1a432e]/80 backdrop-blur px-3 py-1 rounded text-[10px] text-white font-bold uppercase">Sample Image</div>
            </div>
        </div>
        <div class="md:w-7/12 p-12">
            <div class="flex items-center gap-4 mb-6">
                <span class="bg-red-100 text-red-600 px-3 py-1 rounded text-[10px] font-black uppercase tracking-widest">Diagnosis Confirmed</span>
                <span class="text-xs font-bold text-gray-400">Match Accuracy: {{ confidence }}%</span>
            </div>
            
            <h2 class="text-5xl font-black text-[#1a432e] mb-2 tracking-tighter">{{ disease }}</h2>
            <p class="text-gray-500 text-sm mb-10 italic">Analysis complete at {{ timestamp }}</p>
            
            <div class="grid grid-cols-1 gap-6">
                <div class="bg-[#f0f9f4] p-6 rounded-2xl border border-[#34d399]/20">
                    <h3 class="font-bold text-[#1a432e] mb-4 flex items-center gap-2">
                        <span class="text-xl">🛡️</span> Recovery Protocol
                    </h3>
                    <ul class="space-y-3">
                        {% for sug in suggestions %}
                        <li class="text-sm text-[#1a432e]/80 flex gap-3">
                            <span class="text-[#34d399]">✔</span> {{ sug }}
                        </li>
                        {% endfor %}
                    </ul>
                </div>
            </div>
            
            <div class="mt-12 flex gap-4">
                <a href="/" class="btn-primary flex-1 py-4 rounded-xl font-bold text-center">New Diagnosis</a>
                <button onclick="window.print()" class="bg-gray-100 px-6 py-4 rounded-xl font-bold hover:bg-gray-200 transition">Print PDF</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
